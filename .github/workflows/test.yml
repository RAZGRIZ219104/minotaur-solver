name: Tests

# This repo holds reference miner code that depends on the
# `minotaur_subnet` package at runtime. It has no standalone test
# suite — submissions are validated by the validator harness in the
# main subnet repo. As a guard against pure mistakes (typos, broken
# imports, mismatched signatures), this workflow byte-compiles every
# Python file in the repo. It catches "main is broken at parse time"
# without needing the full subnet stack installed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Byte-compile every .py
        run: python -m compileall -q -f .

      - name: Verify solver entry point is parseable and exports SOLVER_CLASS
        run: |
          python - <<'PY'
          import ast, pathlib, sys

          src = pathlib.Path("solver.py").read_text()
          tree = ast.parse(src)
          names = {
              t.id
              for node in tree.body
              if isinstance(node, ast.Assign)
              for t in node.targets
              if isinstance(t, ast.Name)
          }
          if "SOLVER_CLASS" not in names:
              print("solver.py must assign SOLVER_CLASS at module scope", file=sys.stderr)
              sys.exit(1)
          print("solver.py exports SOLVER_CLASS")
          PY
